<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OHC Platform</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="ohc-design-system.css"/>
  <style>
    /* ── Reset ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #F3F4F6; overflow: hidden; }

    /* ── Content shell (right of sidebar, below header) ───── */
    #content-shell {
      position: fixed;
      top: 56px;
      left: 240px;
      right: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      background: #F3F4F6;
    }

    /* ── Content iframe ─────────────────────────────────────── */
    #content-frame {
      flex: 1;
      border: none;
      width: 100%;
      background: #F3F4F6;
      display: block;
    }

    /* ── Loading overlay ────────────────────────────────────── */
    #loading-overlay {
      position: absolute;
      inset: 0;
      background: #F3F4F6;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      pointer-events: none;
    }
    #loading-overlay.hidden { display: none; }

    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #E5E7EB;
      border-top-color: #0EA5E9;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Material icon baseline fix ─────────────────────────── */
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      display: inline-block;
      vertical-align: middle;
      font-size: 18px;
    }

    /* ══════════════════════════════════════════════════════════
       ACCORDION SIDEBAR NAV
       ══════════════════════════════════════════════════════════ */

    /* Base row — shared by leaf <a> and group <button> elements */
    .nav-row {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 36px;
      font-size: 13px;
      font-weight: 400;
      color: #374151;
      cursor: pointer;
      text-decoration: none;
      /* Reset button defaults, then apply left border */
      border: none;
      border-left: 3px solid transparent;
      background: none;
      width: 100%;
      font-family: 'Inter', system-ui, sans-serif;
      transition: background 0.12s, color 0.12s;
      white-space: nowrap;
      overflow: hidden;
      outline: none;
    }
    .nav-row:hover { background: var(--ohc-n-100); }

    /* Indent levels — padding-left adds to the 3px left border visually */
    .nav-row--l1 { padding: 0 10px 0 13px; }   /* icon at ~16px from edge */
    .nav-row--l2 { padding: 0 10px 0 29px; }   /* icon at ~32px from edge */
    .nav-row--l3 { padding: 0 10px 0 44px; }   /* text only, ~47px from edge */

    .nav-icon {
      font-size: 16px;
      flex-shrink: 0;
      color: var(--ohc-n-400);
    }
    .nav-label {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
      text-align: left;
    }
    .nav-chevron {
      font-size: 18px;
      flex-shrink: 0;
      color: var(--ohc-n-400);
      margin-left: auto;
      transition: transform 0.2s ease;
    }

    /* ── Active leaf item ─────────────────────────────── */
    .nav-row.active {
      background: #EFF6FF;
      border-left-color: var(--ohc-primary);
      color: var(--ohc-primary);
      font-weight: 500;
    }
    .nav-row.active .nav-icon { color: var(--ohc-primary); }

    /* ── Open group header (visual cue even without active child) */
    .nav-group.open > .nav-row {
      background: var(--ohc-n-100);
    }

    /* ── Group header when it has an active descendant ─── */
    .nav-row.has-active {
      color: var(--ohc-n-900);
      font-weight: 600;
      background: var(--ohc-n-100);
    }
    .nav-row.has-active .nav-icon { color: var(--ohc-n-600); }
    .nav-row.has-active .nav-chevron { color: var(--ohc-n-600); }

    /* Chevron rotates 180° when group is open */
    .nav-group.open > .nav-row .nav-chevron {
      transform: rotate(180deg);
    }

    /* ── Collapsible group body — CSS Grid trick ──────── */
    /* Animates smoothly at any depth without JS height calculations */
    .nav-group-body {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.22s ease;
    }
    .nav-group.open > .nav-group-body {
      grid-template-rows: 1fr;
    }
    /* Inner wrapper: overflow:hidden is required for 0fr to collapse content */
    .nav-group-body-inner {
      overflow: hidden;
    }

    /* ── L3 sub-item styling (text-only, no icon) ─────── */
    .nav-row--l3 {
      color: var(--ohc-n-600);
      font-size: 12.5px;
    }
    .nav-row--l3.active { color: var(--ohc-primary); }
    .nav-row--l3:hover  { color: #374151; }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════════════════════════
     PERMANENT HEADER
     ══════════════════════════════════════════════════════════ -->
<header class="ohc-header">
  <div class="ohc-header-left">
    <span class="ohc-logo">TGHC</span>
    <span class="ohc-breadcrumb" id="breadcrumb">OHC Platform &gt; Dashboard</span>
  </div>
  <div class="ohc-header-center">
    <div class="ohc-search">
      <span class="material-symbols-outlined search-icon">search</span>
      <input type="text" placeholder="Search patients, medicines, staff…" id="global-search"/>
    </div>
  </div>
  <div class="ohc-header-right">
    <div class="ohc-bell-wrap">
      <span class="material-symbols-outlined">notifications</span>
      <span class="ohc-bell-badge"></span>
    </div>
    <span class="ohc-user-name">Kiran Prasad</span>
    <div class="ohc-avatar">KP</div>
  </div>
</header>

<!-- ══════════════════════════════════════════════════════════
     PERMANENT SIDEBAR
     ══════════════════════════════════════════════════════════ -->
<aside class="ohc-sidebar">
  <select class="ohc-site-selector">
    <option>Select Site</option>
    <option>Site A — Trivandrum</option>
    <option>Site B — Pune</option>
    <option>Site C — Khordha</option>
  </select>
  <!-- Nav tree is populated by JS below -->
  <nav class="ohc-nav" id="main-nav"></nav>
  <div class="ohc-sidebar-footer">
    <a href="javascript:void(0)">
      <span class="material-symbols-outlined mat-icon">help</span>
      Help &amp; Support
    </a>
    <div class="ohc-sidebar-version">OHC v4.0</div>
  </div>
</aside>

<!-- ══════════════════════════════════════════════════════════
     CONTENT SHELL
     ══════════════════════════════════════════════════════════ -->
<div id="content-shell">

  <!-- Loading indicator -->
  <div id="loading-overlay">
    <div class="spinner"></div>
  </div>

  <!-- The iframe that renders each module's content area -->
  <iframe
    id="content-frame"
    title="OHC Module Content"
    sandbox="allow-scripts allow-same-origin allow-forms allow-modals allow-popups"
  ></iframe>

</div>

<!-- ══════════════════════════════════════════════════════════
     NAVIGATION ENGINE
     ══════════════════════════════════════════════════════════ -->
<script>
'use strict';

// ── Navigation tree ───────────────────────────────────────────
// Leaf nodes have `file`. Group nodes have `children`.
// L3 leaf nodes omit `icon`; their indent is visual cue enough.
const NAV = [
  {
    key: 'dashboard',
    label: 'Dashboard',
    icon: 'dashboard',
    file: 'ohc_dashboard_operational_control/code.html?v=6'
  },
  {
    key: 'clinic',
    label: 'Clinic Management',
    icon: 'local_hospital',
    children: [
      {
        key: 'patients',
        label: 'Patients',
        icon: 'person',
        children: [
          { key: 'patients_opd',       label: 'OPD Visits',        file: 'patients_opd_visit_entry/code.html?v=7' },
          { key: 'patients_firstaid',  label: 'First Aid Register', file: 'patients_first_aid_register_itc/code.html' },
          { key: 'patients_doctor',    label: 'Doctor Register',    file: 'patients_doctor_register_v4/code.html' },
          { key: 'patients_ambulance', label: 'Ambulance Register', file: 'patients_ambulance_register/code.html' },
          { key: 'patients_rest',      label: 'Rest Case',          file: 'patients_rest_case_allianz/code.html?v=2' }
        ]
      },
      { key: 'clinicians',    label: 'Clinicians',    icon: 'medical_services', file: 'clinicians_staff_master_roster/code.html' },
      { key: 'prescriptions', label: 'Prescriptions', icon: 'prescriptions',    file: 'prescriptions_digital_rx_log/code.html' },
      {
        key: 'pharmacy',
        label: 'Pharmacy',
        icon: 'local_pharmacy',
        children: [
          { key: 'pharmacy_stock',   label: 'Stock Management', file: 'pharmacy_stock_management_v4_1/code.html' },
          { key: 'pharmacy_oxygen',  label: 'Oxygen Supply',    file: 'Oxygen Supply/code.html' },
          { key: 'pharmacy_vending', label: 'Vending Machine',  file: 'Vending Machine/code.html' }
        ]
      },
      { key: 'bmw', label: 'Biomedical Waste', icon: 'delete_sweep', file: 'bmw_tracking_collection_log_v4/code.html' }
    ]
  },
  {
    key: 'health_camps',
    label: 'Health Camps & Screenings',
    icon: 'campaign',
    file: 'health_camps_screening_events_v4/code.html'
  },
  {
    key: 'wellness',
    label: 'Wellness',
    icon: 'favorite',
    children: [
      { key: 'toolbox',        label: 'Toolbox Trainings', icon: 'construction', file: 'Toolbox Training/code.html' },
      { key: 'other_wellness', label: 'Other Wellness',    icon: 'spa',          file: 'wellness_campaigns_calendar_v4/code.html' }
    ]
  },
  {
    key: 'compliance',
    label: 'Compliance & Audits',
    icon: 'fact_check',
    children: [
      { key: 'compliance_matrix', label: 'Compliance Matrix', icon: 'checklist',    file: 'compliance_audits_operational_hub_v4/code.html' },
      {
        key: 'oshwc',
        label: 'OSHWC Compliance',
        icon: 'health_and_safety',
        children: [
          { key: 'oshwc_overview',   label: 'Compliance Overview',   file: 'OSHWC Compliance/compliance-overview.html' },
          { key: 'oshwc_medical',    label: 'Medical Surveillance',  file: 'OSHWC Compliance/medical-surveillance.html' },
          { key: 'oshwc_incidents',  label: 'Incidents & Diseases',  file: 'OSHWC Compliance/incidents-diseases.html' },
          { key: 'oshwc_audits',     label: 'Safety Audits',         file: 'OSHWC Compliance/safety-audits.html' },
          { key: 'oshwc_hazards',    label: 'Hazardous Processes',   file: 'OSHWC Compliance/hazardous-processes.html' },
          { key: 'oshwc_incident_register', label: 'Incident Register', file: 'others_incident_register_v4/code.html?v=7' }
        ]
      },
      { key: 'general_inventory', label: 'General Inventory', icon: 'inventory_2',  file: 'general_inventory_register_allianz/code.html' }
    ]
  },
  {
    key: 'analytics',
    label: 'Analytics',
    icon: 'analytics',
    file: 'analytics_reports_operational_insights_v4/code.html?v=7'
  },
  {
    key: 'others',
    label: 'Others',
    icon: 'more_horiz',
    children: [
      { key: 'invoice',  label: 'Invoice Tracker',   icon: 'receipt_long',          file: 'invoice_tracker_allianz_finance_v4/code.html' },
      { key: 'laundry',  label: 'Laundry Register',  icon: 'local_laundry_service', file: 'laundry_register_allianz_compliance_v4/code.html' }
    ]
  },
  {
    key: 'settings',
    label: 'Settings',
    icon: 'settings',
    file: 'settings_platform_configuration_v4/code.html'
  }
];

// ── Flat map of all leaf nodes (key → item) ───────────────────
const LEAF_MAP = {};
(function buildLeafMap(items) {
  items.forEach(item => {
    if (item.file)     LEAF_MAP[item.key] = item;
    if (item.children) buildLeafMap(item.children);
  });
}(NAV));

// ── DOM refs ──────────────────────────────────────────────────
const iframe         = document.getElementById('content-frame');
const breadcrumbEl   = document.getElementById('breadcrumb');
const loadingOverlay = document.getElementById('loading-overlay');
const mainNav        = document.getElementById('main-nav');

// ── State ─────────────────────────────────────────────────────
let activeKey = null;

// ── Shell-hide CSS injected into each iframe after load ───────
const OVERRIDE_CSS = `
  .ohc-header  { display: none !important; }
  .ohc-sidebar { display: none !important; }
  .ohc-main    { margin-left: 0 !important; padding-top: 0 !important;
                 padding: 24px !important;
                 min-height: 100vh; background: #F3F4F6; }
  .ohc-content { padding: 0 !important; }
  body         { overflow-y: auto !important; background: #F3F4F6 !important; }
`;

// ── File loader ───────────────────────────────────────────────
function loadFile(file) {
  loadingOverlay.classList.remove('hidden');
  iframe.src = file;
}

iframe.addEventListener('load', () => {
  try {
    const doc = iframe.contentDocument || iframe.contentWindow.document;
    if (!doc) return;
    const old = doc.getElementById('__ohc-override');
    if (old) old.remove();
    const style = doc.createElement('style');
    style.id = '__ohc-override';
    style.textContent = OVERRIDE_CSS;
    (doc.head || doc.documentElement).appendChild(style);
  } catch (e) {
    console.warn('Could not inject override CSS:', e);
  }
  loadingOverlay.classList.add('hidden');
});

// ── Nav tree renderer ─────────────────────────────────────────
// Recursively builds HTML string for the nav tree.
// level 1 = top-level, 2 = children of groups, 3 = sub-children.
function renderNav(items, level) {
  level = level || 1;
  return items.map(item => {
    const iconHtml = item.icon
      ? `<span class="nav-icon material-symbols-outlined">${item.icon}</span>`
      : '';

    if (item.file) {
      // ── Leaf node ─────────────────────────────────────────
      return `<a class="nav-row nav-row--l${level}"
                 data-key="${item.key}"
                 href="javascript:void(0)"
                 onclick="navigateTo('${item.key}')">${iconHtml}<span class="nav-label">${item.label}</span></a>`;
    } else {
      // ── Group / accordion node ────────────────────────────
      return `<div class="nav-group" id="group-${item.key}">
        <button class="nav-row nav-row--l${level}"
                onclick="toggleGroup('${item.key}')">${iconHtml}<span class="nav-label">${item.label}</span><span class="nav-chevron material-symbols-outlined">expand_more</span></button>
        <div class="nav-group-body">
          <div class="nav-group-body-inner">${renderNav(item.children, level + 1)}</div>
        </div>
      </div>`;
    }
  }).join('');
}

// Inject the nav tree into the sidebar
mainNav.innerHTML = renderNav(NAV);

// ── Tree helpers ──────────────────────────────────────────────

// Returns array of ancestor group keys from root down to (not including) targetKey.
// Returns null if targetKey not found.
function findAncestors(items, targetKey, path) {
  path = path || [];
  for (const item of items) {
    if (item.key === targetKey) return path;
    if (item.children) {
      const found = findAncestors(item.children, targetKey, [...path, item.key]);
      if (found !== null) return found;
    }
  }
  return null;
}

// Returns array of labels from root down to and including targetKey.
// Returns null if targetKey not found.
function findLabelPath(items, targetKey, path) {
  path = path || [];
  for (const item of items) {
    const current = [...path, item.label];
    if (item.key === targetKey) return current;
    if (item.children) {
      const found = findLabelPath(item.children, targetKey, current);
      if (found !== null) return found;
    }
  }
  return null;
}

// ── Accordion toggle ──────────────────────────────────────────
function toggleGroup(key) {
  const groupEl = document.getElementById('group-' + key);
  if (groupEl) groupEl.classList.toggle('open');
}

// ── Main navigation ───────────────────────────────────────────
function navigateTo(key) {
  const item = LEAF_MAP[key];
  if (!item) return;

  activeKey = key;

  // Clear all previous active / has-active states
  mainNav.querySelectorAll('.nav-row.active, .nav-row.has-active').forEach(el => {
    el.classList.remove('active', 'has-active');
  });

  // Mark the leaf row as active
  const leafEl = mainNav.querySelector(`.nav-row[data-key="${key}"]`);
  if (leafEl) leafEl.classList.add('active');

  // Open every ancestor group and mark its header row
  const ancestors = findAncestors(NAV, key) || [];
  ancestors.forEach(groupKey => {
    const groupEl = document.getElementById('group-' + groupKey);
    if (!groupEl) return;
    groupEl.classList.add('open');
    const headerBtn = groupEl.querySelector(':scope > .nav-row');
    if (headerBtn) headerBtn.classList.add('has-active');
  });

  // Update breadcrumb with full path
  const labelPath = findLabelPath(NAV, key) || [item.label];
  breadcrumbEl.textContent = 'OHC Platform › ' + labelPath.join(' › ');

  // Load the module file into the iframe
  loadFile(item.file);
}

// ── Boot: load Dashboard ──────────────────────────────────────
navigateTo('dashboard');
</script>

</body>
</html>
