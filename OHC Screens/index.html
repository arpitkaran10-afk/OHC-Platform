<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OHC Platform</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="ohc-design-system.css"/>
  <style>
    /* ── Reset ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #F3F4F6; overflow: hidden; }

    /* ── Content shell (right of sidebar, below header) ───── */
    #content-shell {
      position: fixed;
      top: 56px;
      left: 240px;
      right: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      background: #F3F4F6;
    }

    /* ── Content iframe ─────────────────────────────────────── */
    #content-frame {
      flex: 1;
      border: none;
      width: 100%;
      background: #F3F4F6;
      display: block;
    }

    /* ── Loading overlay ────────────────────────────────────── */
    #loading-overlay {
      position: absolute;
      inset: 0;
      background: #F3F4F6;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      pointer-events: none;
    }
    #loading-overlay.hidden { display: none; }

    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #E5E7EB;
      border-top-color: #0EA5E9;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Material icon baseline fix ─────────────────────────── */
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      display: inline-block;
      vertical-align: middle;
      font-size: 18px;
    }

    /* ══════════════════════════════════════════════════════════
       ACCORDION SIDEBAR NAV
       ══════════════════════════════════════════════════════════ */

    /* Base row — shared by leaf <a> and group <button> elements */
    .nav-row {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 36px;
      font-size: 13px;
      font-weight: 400;
      color: #374151;
      cursor: pointer;
      text-decoration: none;
      /* Reset button defaults, then apply left border */
      border: none;
      border-left: 3px solid transparent;
      background: none;
      width: 100%;
      font-family: 'Inter', system-ui, sans-serif;
      transition: background 0.12s, color 0.12s;
      white-space: nowrap;
      overflow: hidden;
      outline: none;
    }
    .nav-row:hover { background: var(--ohc-n-100); }

    /* Indent levels — padding-left adds to the 3px left border visually */
    .nav-row--l1 { padding: 0 10px 0 13px; }   /* icon at ~16px from edge */
    .nav-row--l2 { padding: 0 10px 0 29px; }   /* icon at ~32px from edge */
    .nav-row--l3 { padding: 0 10px 0 44px; }   /* text only, ~47px from edge */

    .nav-icon {
      font-size: 16px;
      flex-shrink: 0;
      color: var(--ohc-n-400);
    }
    .nav-label {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
      text-align: left;
    }
    .nav-chevron {
      font-size: 18px;
      flex-shrink: 0;
      color: var(--ohc-n-400);
      margin-left: auto;
      transition: transform 0.2s ease;
    }

    /* ── Active leaf item ─────────────────────────────── */
    .nav-row.active {
      background: #EFF6FF;
      border-left-color: var(--ohc-primary);
      color: var(--ohc-primary);
      font-weight: 500;
    }
    .nav-row.active .nav-icon { color: var(--ohc-primary); }

    /* ── Open group header (visual cue even without active child) */
    .nav-group.open > .nav-row {
      background: var(--ohc-n-100);
    }

    /* ── Group header when it has an active descendant ─── */
    .nav-row.has-active {
      color: var(--ohc-n-900);
      font-weight: 600;
      background: var(--ohc-n-100);
    }
    .nav-row.has-active .nav-icon { color: var(--ohc-n-600); }
    .nav-row.has-active .nav-chevron { color: var(--ohc-n-600); }

    /* Chevron rotates 180° when group is open */
    .nav-group.open > .nav-row .nav-chevron {
      transform: rotate(180deg);
    }

    /* ── Collapsible group body — CSS Grid trick ──────── */
    /* Animates smoothly at any depth without JS height calculations */
    .nav-group-body {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.22s ease;
    }
    .nav-group.open > .nav-group-body {
      grid-template-rows: 1fr;
    }
    /* Inner wrapper: overflow:hidden is required for 0fr to collapse content */
    .nav-group-body-inner {
      overflow: hidden;
    }

    /* ── L3 sub-item styling (text-only, no icon) ─────── */
    .nav-row--l3 {
      color: var(--ohc-n-600);
      font-size: 12.5px;
    }
    .nav-row--l3.active { color: var(--ohc-primary); }
    .nav-row--l3:hover  { color: #374151; }

    /* ── Role switcher (dev-only, not production UI) ─── */
    #role-switcher-wrap {
      display: flex; align-items: center; gap: 6px;
      margin-right: 8px;
    }
    #role-switcher-label {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; color: #9CA3AF; white-space: nowrap;
    }
    #role-switcher {
      height: 28px; border: 1px solid #E5E7EB; border-radius: 6px;
      background: #F9FAFB; font-size: 12px; font-weight: 500;
      color: #374151; padding: 0 8px; cursor: pointer; outline: none;
    }
    #role-switcher:focus { border-color: #0EA5E9; }
    /* view-only banner injected into iframes */
    #__ohc-view-banner {
      position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
      background: #FEF3C7; border-bottom: 1px solid #FCD34D;
      padding: 5px 16px; font-size: 12px; font-weight: 600; color: #92400E;
      display: flex; align-items: center; gap: 6px; pointer-events: none;
    }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════════════════════════
     NAVIGATION ENGINE
     ══════════════════════════════════════════════════════════ -->
<script>
'use strict';

// ── Navigation tree ───────────────────────────────────────────
// Leaf nodes have `file`. Group nodes have `children`.
// L3 leaf nodes omit `icon`; their indent is visual cue enough.
const NAV = [

      {
        key: 'oshwc',
        label: 'OSHWC Compliance',
        icon: 'health_and_safety',
        children: [
          { key: 'oshwc_overview',   label: 'Compliance Overview',   file: 'OSHWC Compliance/compliance-overview.html' },
          { key: 'oshwc_medical',    label: 'Medical Surveillance',  file: 'OSHWC Compliance/medical-surveillance.html' },
          { key: 'oshwc_incidents',  label: 'Incidents & Diseases',  file: 'OSHWC Compliance/incidents-diseases.html' },
          { key: 'oshwc_audits',     label: 'Safety Audits',         file: 'OSHWC Compliance/safety-audits.html' },
          { key: 'oshwc_hazards',    label: 'Hazardous Processes',   file: 'OSHWC Compliance/hazardous-processes.html' },
          { key: 'oshwc_incident_register', label: 'Incident Register', file: 'others_incident_register_v4/code.html?v=7' }
        ]
      },
      { key: 'general_inventory', label: 'General Inventory', icon: 'inventory_2',  file: 'general_inventory_register_allianz/code.html?v=3' }
    ]
  },
  {
    key: 'analytics',
    label: 'Analytics',
    icon: 'analytics',
    file: 'analytics_reports_operational_insights_v4/code.html?v=7'
  },

    children: [
      { key: 'invoice',  label: 'Invoice Tracker',   icon: 'receipt_long',          file: 'invoice_tracker_allianz_finance_v4/code.html?v=2' },
      { key: 'laundry',  label: 'Laundry Register',  icon: 'local_laundry_service', file: 'laundry_register_allianz_compliance_v4/code.html?v=2' }
    ]
  },
  {

    icon: 'settings',
    file: 'settings_platform_configuration_v4/code.html'
  }
];

// ════════════════════════════════════════════════════════════════
//  RBAC — PERMISSIONS CONFIG
//  access levels: 'edit' | 'view' | 'none'
//
//  Keys map to top-level NAV group keys or individual leaf keys.
//  A group key covers ALL descendants unless a more specific
//  leaf/sub-key overrides it (most-specific wins).
//
//  Special case: doctor has edit on 'patients_doctor' only;
//  everything else in 'clinic' is 'view'.
// ════════════════════════════════════════════════════════════════
const ROLE_PERMISSIONS = {
  admin: {
    _default: 'edit'   // admin sees and edits everything
  },
  nurse: {
    _default:   'edit',
    settings:   'none'
  },
  doctor: {
    _default:            'none',
    dashboard:           'view',
    // clinic group — view overall, but patients_doctor is edit
    clinic:              'view',
    patients:            'view',
    patients_opd:        'view',
    patients_firstaid:   'view',
    patients_doctor:     'edit',   // ← the nested exception
    patients_ambulance:  'view',
    patients_rest:       'view',
    clinicians:          'view',
    prescriptions:       'view',
    pharmacy:            'view',
    pharmacy_stock:      'view',
    pharmacy_oxygen:     'view',
    pharmacy_vending:    'view',
    bmw:                 'view',
    analytics:           'view',
    // everything else stays 'none'
    health_camps:                'none',
    health_camps_safety_checks:  'none',
    wellness:                    'none',
    compliance:          'none',
    others:              'none',
    settings:            'none'
  },
  tghc_ops: {
    _default: 'view',
    settings: 'none'
  },
  safety_manager: {
    _default:                    'none',
    dashboard:                   'view',
    patients:                    'view',
    patients_doctor:             'view',
    bmw:                         'view',
    health_camps:                'view',
    health_camps_safety_checks:  'view',
    compliance:                  'view',
    analytics:                   'view',
    clinicians:                  'none',
    prescriptions:               'none',
    pharmacy:                    'none',
    wellness:                    'none',
    others:                      'none',
    settings:                    'none'
  },
  client_hr: {
    _default:  'view',
    others:    'none',
    settings:  'none'
  }
};

// ── Flat map of all leaf nodes (key → item) ───────────────────
const LEAF_MAP = {};
(function buildLeafMap(items) {
  items.forEach(item => {
    if (item.file || item.external) LEAF_MAP[item.key] = item;
    if (item.children) buildLeafMap(item.children);
  });
}(NAV));

// ── DOM refs ──────────────────────────────────────────────────
const iframe         = document.getElementById('content-frame');
const breadcrumbEl   = document.getElementById('breadcrumb');
const loadingOverlay = document.getElementById('loading-overlay');
const mainNav        = document.getElementById('main-nav');

// ── State ─────────────────────────────────────────────────────
let activeKey  = null;
let activeRole = localStorage.getItem('ohc_active_role') || 'admin';

// ── Sync role switcher dropdown to stored role ────────────────
document.getElementById('role-switcher').value = activeRole;

// ════════════════════════════════════════════════════════════════
//  PERMISSION RESOLVER
//  Walks from most-specific key up to _default.
//  ancestors = array of group keys from root to parent (inclusive).
// ════════════════════════════════════════════════════════════════
function ohcGetAccess(leafKey, ancestorKeys) {
  const perms = ROLE_PERMISSIONS[activeRole];
  if (!perms) return 'none';

  // Check from most specific → least specific
  const chain = [leafKey, ...(ancestorKeys || []).slice().reverse(), '_default'];
  for (const k of chain) {
    if (perms[k] !== undefined) return perms[k];
  }
  return 'none';
}

// Build a lookup: leafKey → access level, using ancestor context
const ACCESS_CACHE = {};
function buildAccessCache(items, ancestors) {
  ancestors = ancestors || [];
  items.forEach(item => {
    if (item.file || item.external) {
      ACCESS_CACHE[item.key] = ohcGetAccess(item.key, ancestors);
    }
    if (item.children) {
      buildAccessCache(item.children, [item.key, ...ancestors]);
    }
  });
}
buildAccessCache(NAV, []);

// ════════════════════════════════════════════════════════════════
//  NAV VISIBILITY: does a subtree have any non-'none' node?
// ════════════════════════════════════════════════════════════════
function subtreeVisible(item, ancestors) {
  ancestors = ancestors || [];
  if (item.file || item.external) {
    return ACCESS_CACHE[item.key] !== 'none';
  }
  if (item.children) {
    return item.children.some(child => subtreeVisible(child, [item.key, ...ancestors]));
  }
  return false;
}

// ── Shell-hide CSS injected into each iframe after load ───────
const OVERRIDE_CSS = `
  .ohc-header  { display: none !important; }
  .ohc-sidebar { display: none !important; }
  .ohc-main    { margin-left: 0 !important; padding-top: 0 !important;
                 padding: 24px !important;
                 min-height: 100vh; background: #F3F4F6; }
  .ohc-content { padding: 0 !important; }
  body         { overflow-y: auto !important; background: #F3F4F6 !important; }
`;

// CSS injected into view-only iframes — disables all edit affordances
const VIEW_ONLY_CSS = `
  /* Hide add/create/edit/save buttons and action icons */
  button[onclick*="OpenModal"],
  button[onclick*="openModal"],
  button[onclick*="showForm"],
  button[onclick*="AddModal"],
  button[onclick*="LogModal"],
  a[onclick*="OpenModal"],
  #pe-overlay, #hc-overlay, #gi-log-overlay, #gi-add-overlay,
  #inv-overlay, #lr-overlay, #ox-overlay, #vm-overlay,
  #bw-overlay, #tb-overlay, #wc-overlay, #hz-overlay,
  #rx-overlay, #sm-overlay {
    display: none !important;
  }
  /* Disable all form inputs, selects, textareas, submit buttons */
  input, select, textarea, button[type="submit"], button[type="button"] {
    pointer-events: none !important;
    opacity: 0.6 !important;
    cursor: default !important;
  }
  /* Re-enable filter pills and read controls so view works */
  .filter-pill, .hc-pill, .rx-pill, .bw-pill, .ox-pill,
  .vm-pill, .lr-pill, .pe-pill, .tb-pill, .wc-pill, .gi-pill,
  .inv-pill, .hz-pill, .sm-pill {
    pointer-events: auto !important;
    opacity: 1 !important;
    cursor: pointer !important;
  }
  /* Hide the page-level "+ New / Create / Add / Log" primary action buttons */
  .ohc-content > div > button,
  .ohc-content > .ohc-content-header button,
  [onclick*="OpenModal"]:not(.filter-pill),
  [onclick*="openModal"]:not(.filter-pill) {
    display: none !important;
  }
`;

// For Doctor role on patients_doctor: full edit allowed — inject no restrictions
const DOCTOR_EDIT_OVERRIDE_CSS = `/* Doctor Register — full edit for Doctor role */`;

// ── File loader ───────────────────────────────────────────────
function loadFile(file) {
  loadingOverlay.classList.remove('hidden');
  const sep = file.includes('?') ? '&' : '?';
  iframe.src = file + sep + 't=' + Date.now();
}

iframe.addEventListener('load', () => {
  try {
    const doc = iframe.contentDocument || iframe.contentWindow.document;
    if (!doc) return;

    // Inject shell override CSS
    let old = doc.getElementById('__ohc-override');
    if (old) old.remove();
    const style = doc.createElement('style');
    style.id = '__ohc-override';
    style.textContent = OVERRIDE_CSS;
    (doc.head || doc.documentElement).appendChild(style);

    // Determine access for current active key
    const access = activeKey ? (ACCESS_CACHE[activeKey] || 'none') : 'edit';

    // Remove any previous view-only style + banner
    let oldVo = doc.getElementById('__ohc-viewonly');
    if (oldVo) oldVo.remove();
    let oldBanner = doc.getElementById('__ohc-view-banner');
    if (oldBanner) oldBanner.remove();

    if (access === 'view') {
      // Inject read-only CSS
      const voStyle = doc.createElement('style');
      voStyle.id = '__ohc-viewonly';
      voStyle.textContent = VIEW_ONLY_CSS;
      (doc.head || doc.documentElement).appendChild(voStyle);

      // Inject view-only banner
      const banner = doc.createElement('div');
      banner.id = '__ohc-view-banner';
      banner.innerHTML = '&#128274; View Only — your role does not have edit access to this module';
      (doc.body || doc.documentElement).insertBefore(banner, doc.body.firstChild);
    }
  } catch (e) {
    console.warn('Could not inject override CSS:', e);
  }
  loadingOverlay.classList.add('hidden');
});

// ── Nav tree renderer (RBAC-aware) ───────────────────────────
// Hides nodes where access === 'none' (entire subtree pruned).
function renderNav(items, level) {
  level = level || 1;
  return items
    .filter(item => subtreeVisible(item))
    .map(item => {
      const iconHtml = item.icon
        ? `<span class="nav-icon material-symbols-outlined">${item.icon}</span>`
        : '';

      if (item.external) {
        return `<a class="nav-row nav-row--l${level}"
                   data-key="${item.key}"
                   href="javascript:void(0)"
                   onclick="navigateTo('${item.key}')">${iconHtml}<span class="nav-label">${item.label}</span></a>`;
      } else if (item.file) {
        return `<a class="nav-row nav-row--l${level}"
                   data-key="${item.key}"
                   href="javascript:void(0)"
                   onclick="navigateTo('${item.key}')">${iconHtml}<span class="nav-label">${item.label}</span></a>`;
      } else {
        const childrenHtml = (item.children || []).length
          ? renderNav(item.children, level + 1)
          : '';
        return `<div class="nav-group" id="group-${item.key}">
          <button class="nav-row nav-row--l${level}"
                  onclick="toggleGroup('${item.key}')">${iconHtml}<span class="nav-label">${item.label}</span><span class="nav-chevron material-symbols-outlined">expand_more</span></button>
          <div class="nav-group-body">
            <div class="nav-group-body-inner">${childrenHtml}</div>
          </div>
        </div>`;
      }
    }).join('');
}

// ── Tree helpers ──────────────────────────────────────────────
function findAncestors(items, targetKey, path) {
  path = path || [];
  for (const item of items) {
    if (item.key === targetKey) return path;
    if (item.children) {
      const found = findAncestors(item.children, targetKey, [...path, item.key]);
      if (found !== null) return found;
    }
  }
  return null;
}

function findLabelPath(items, targetKey, path) {
  path = path || [];
  for (const item of items) {
    const current = [...path, item.label];
    if (item.key === targetKey) return current;
    if (item.children) {
      const found = findLabelPath(item.children, targetKey, current);
      if (found !== null) return found;
    }
  }
  return null;
}

// Find the first visible leaf in the nav tree (used for fallback navigation)
function findFirstVisibleLeaf(items) {
  for (const item of items) {
    if (item.file && ACCESS_CACHE[item.key] !== 'none') return item.key;
    if (item.external && ACCESS_CACHE[item.key] !== 'none') return null; // skip external for auto-nav
    if (item.children) {
      const found = findFirstVisibleLeaf(item.children);
      if (found) return found;
    }
  }
  return null;
}

// ── Accordion toggle ──────────────────────────────────────────
function toggleGroup(key) {
  const groupEl = document.getElementById('group-' + key);
  if (groupEl) groupEl.classList.toggle('open');
}

// ── Main navigation ───────────────────────────────────────────
function navigateTo(key) {
  const item = LEAF_MAP[key];
  if (!item) return;

  // Block navigation to 'none' access nodes (shouldn't appear in nav, but guard anyway)
  if (ACCESS_CACHE[key] === 'none') return;

  if (item.external && item.url) {
    window.open(item.url, '_blank', 'noopener,noreferrer');
    return;
  }

  activeKey = key;

  mainNav.querySelectorAll('.nav-row.active, .nav-row.has-active').forEach(el => {
    el.classList.remove('active', 'has-active');
  });

  const leafEl = mainNav.querySelector(`.nav-row[data-key="${key}"]`);
  if (leafEl) leafEl.classList.add('active');

  const ancestors = findAncestors(NAV, key) || [];
  ancestors.forEach(groupKey => {
    const groupEl = document.getElementById('group-' + groupKey);
    if (!groupEl) return;
    groupEl.classList.add('open');
    const headerBtn = groupEl.querySelector(':scope > .nav-row');
    if (headerBtn) headerBtn.classList.add('has-active');
  });

  const labelPath = findLabelPath(NAV, key) || [item.label];
  breadcrumbEl.textContent = 'OHC Platform › ' + labelPath.join(' › ');

  loadFile(item.file);
}

// ── Role switcher ─────────────────────────────────────────────
const ROLE_LABELS = {
  admin:           'Admin',
  nurse:           'Nurse',
  doctor:          'Doctor',
  tghc_ops:        'TGHC Ops',
  safety_manager:  'Safety Manager',
  client_hr:       'Client HR'
};

function ohcSetRole(role) {
  activeRole = role;
  localStorage.setItem('ohc_active_role', role);

  // Rebuild access cache for new role
  Object.keys(ACCESS_CACHE).forEach(k => delete ACCESS_CACHE[k]);
  buildAccessCache(NAV, []);

  // Re-render nav
  mainNav.innerHTML = renderNav(NAV);

  // Navigate to first visible leaf (or dashboard if accessible)
  const dashAccess = ACCESS_CACHE['dashboard'];
  if (dashAccess && dashAccess !== 'none') {
    navigateTo('dashboard');
  } else {
    const fallback = findFirstVisibleLeaf(NAV);
    if (fallback) navigateTo(fallback);
  }
}

// ── Boot ──────────────────────────────────────────────────────
mainNav.innerHTML = renderNav(NAV);
// Navigate to first accessible screen for this role
const _initDash = ACCESS_CACHE['dashboard'];
if (_initDash && _initDash !== 'none') {
  navigateTo('dashboard');
} else {
  const _fallback = findFirstVisibleLeaf(NAV);
  if (_fallback) navigateTo(_fallback);
}
</script>
